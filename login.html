<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="fonts/icomoon/style.css" />
    <link rel="stylesheet" href="login/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="login/css/bootstrap.min.css" />

    <link rel="stylesheet" href="c:\Users\SIGMA\Desktop\rawasi\login\css\style.css" />

    <title>تسجيل الدخول</title>
  </head>
  <body>
    <div class="d-lg-flex half">
      <div
        class="bg order-1 order-md-2"
        style="background-image: url('login/img/mechanic-efficiency-wsm-workshop-owners.png')"></div>
      <div class="contents order-2 order-md-1">
        <div class="container">
          <div class="row align-items-center justify-content-center">
            <div class="col-md-7">
              <h3>تسجيل الدخول</h3>
              <form action="#" method="post">
                <div class="form-group first">
                  <label for="username">اسم المستخدم</label>
                  <input type="text" class="form-control" placeholder="email@gmail.com" id="username"/>
                </div>
                <div class="form-group last mb-3">
                  <label for="password">الكلمة السرية</label>
                  <input type="password" class="form-control" placeholder="Your Password" id="password"/>
                </div>
                <div class="d-flex mb-5 align-items-center">
                  <label class="control control--checkbox mb-0"
                    ><span class="caption">تذكرني</span>
                    <input type="checkbox"/>
                    <div class="control__indicator"></div>
                  </label>
                  <span class="ml-auto"
                    ><a href="#" class="forgot-pass">نسيت كلمة المرور</a></span
                  >
                </div>

                <input type="submit" value="تسجيل الدخول" class="btn btn-block btn-primary"/>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
